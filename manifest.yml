---
# cf push -f manifest.yml --vars-file vars.yml
# (or) cf push --var domain=cfapps.eu10.hana.ondemand.com --var backend-host=go-btp-mwe
#
# The approuter needs the backend's public URL baked into its `destinations`
# env var. CF manifest vars keep us from hard-coding the region/account.
applications:

  # Go backend — talks to the on-premise SAP system. Not meant to be hit
  # directly by end users; the approuter is the public entry point.
  #
  # We use binary_buildpack deliberately: the classic go_buildpack invokes
  # the Go toolchain on the CF stager, which on eu10 OOMs with Go 1.26 +
  # Gin 1.12 dep trees (see README §Deployment). Cross-compiling locally
  # or in CI produces a static ./bin/server and the stager just launches
  # it. The `command` below is what binary_buildpack runs on start.
  #
  # Build the binary before `cf push`:
  #   make build-linux          # POSIX
  #   scripts/build.ps1         # Windows PowerShell
  # or the one-liner they wrap:
  #   CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/server ./cmd/server
  - name: ((backend-host))
    path: .
    memory: 128M
    disk_quota: 256M
    instances: 1
    buildpacks:
      - binary_buildpack
    command: ./bin/server
    env:
      GIN_MODE: release
    services:
      - go-xsuaa
      - go-dest
      - go-cc

  # SAP approuter — the browser-facing front door. Runs OAuth auth-code flow
  # against XSUAA and forwards the resulting JWT to the Go backend via the
  # JSON-defined destination below.
  - name: ((backend-host))-web
    path: web
    memory: 128M
    disk_quota: 256M
    instances: 1
    buildpacks:
      - nodejs_buildpack
    env:
      destinations: >
        [
          { "name": "GoBackend",
            "url":  "https://((backend-host)).((domain))",
            "forwardAuthToken": true }
        ]
    services:
      - go-xsuaa
